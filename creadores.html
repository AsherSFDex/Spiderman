<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Creador</title>

<style>
/* Vixo, este es el fondo */
body{
    background:#0b0b0b;
    color:white;
    font-family:Arial;
    text-align:center;
    margin:0;
}

/* Este es el encabezado */
header{
    background:linear-gradient(red, black);
    padding:20px;
}

/* Esta es la tarjeta */
.card{
    background:#1a1a1a;
    width:300px;
    margin:40px auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0px 0px 15px red;
}

/* Esta es la foto */
.card img{
    width:120px;
    border-radius:50%;
    border:3px solid red;
}

/* Este es el texto */
.nombre{
    font-size:22px;
    color:red;
}

.info{
    font-size:14px;
    color:#ccc;
}

/* La frase */
.frase{
    margin-top:20px;
    font-style:italic;
    color:#ff4d4d;
}

/* Las redes sociaales */
.redes img{
    width:40px;
    margin:8px;
    transition:0.3s;
}

.redes img:hover{
    transform:scale(1.2);
}

/* El botón */
.boton{
    display:inline-block;
    margin-top:15px;
    padding:10px;
    background:red;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.boton:hover{
    background:#ff3333;
}
</style>

</head>

<body style="background-image: url('minimalist-spiderman-3840x2160.jpg'); background-size: cover;">

<header><h1>Identidad del Creador</h1></header>

<div class="card">

<img src="TuFoto.jpg">

<p class="nombre">Vicente</p>

<p class="info">
Creador del sitio web inspirado en Spider-Man.<br>
Apasionado por el diseño y los superhéroes.
</p>

<p class="info">
Ubicación: Chile<br>
Proyecto: Página Web Escolar
</p>

<div class="frase">
"Un gran poder conlleva una gran responsabilidad"
</div>

<a href="Actividad - Pagina y Software Web.pdf" download class="boton">
Descargar actividad
</a>

</div>

<!-- Redes abajo -->
<div class="redes">

<a href="https://instagram.com" target="_blank">
<img src="instagram.png">
</a>

<a href="https://facebook.com" target="_blank">
<img src="facebook-884378_1280.png">
</a>

<a href="https://x.com" target="_blank">
<img src="X_icon.svg.png">
</a>
<br><br>
<a href="https://wa.me/569XXXXXXXX" target="_blank">
<img src="png-clipart-black-whatsapp-logo-whatsapp-computer-icons-whatsapp-logo-monochrome.png" style="width:50px;">
</a>

<!-- El CSS lo use para darle diseño
 a la pagina y que no se viera tan basica. En body cambie el fondo, el 
 tipo de letra y el color del texto. En header hice la parte superior con
 colores rojo y negro para que tuviera estilo de Spider-Man. Despues use .card para
 crear una especie de tarjeta donde van los datos del creador, y en .card img cambie el
 tamaño y la forma de la foto para que se vea redonda. Tambien use .nombre y .info para
 cambiar el tamaño y color de los textos. La parte de .frase sirve para destacar la
 frase famosa de Spider-Man. En .redes img cambie el tamaño de los iconos de redes
 sociales y con hover hice que se agrandaran cuando se pasa el mouse encima. Finalmente,
 .boton lo use para darle diseño al boton de descarga del PDF. -->
</div>

</body>
</html>
