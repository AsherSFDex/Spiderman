<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contacto</title>

<style>
body{color:white; font-family:Arial; text-align:center;}
form{
    background:rgba(0,0,0,0.7);
    display:inline-block;
    padding:20px;
}
input, select, textarea{
    margin:5px;
    padding:5px;
}
</style>

</head>

<body style="background-image: url('minimalist-spiderman-3840x2160.jpg'); background-size: cover;">

<h1>Contacto</h1>

<form>

Nombre:<br>
<input type="text"><br>

Teléfono:<br>
<input type="text"><br>

Correo:<br>
<input type="email"><br>

Edad:<br>
<input type="number"><br>

Fecha:<br>
<input type="date"><br>

Hora:<br>
<input type="time"><br>

Ciudad:<br>
<select>
<option>Rancagua</option>
<option>Santiago</option>
</select><br>

Comentario:<br>
<textarea></textarea><br>

<input type="submit" value="Enviar">
<!-- El CSS lo use para que el formulario se viera mas ordenado y
moderno. En body cambie el color del texto, el tipo de letra y el fondo de la
pagina. Despues use form para crear una especie de cuadro donde va todo el
formulario y le puse un fondo oscuro para que se pudiera leer mejor. En input,
select y textarea cambie el espacio y tamaño para que las cajas no se vieran
tan pequeñas y quedaran mas comodas al escribir. Tambien use button para cambiar
el diseño del boton enviar y ponerle colores relacionados con Spider-Man. -->
</form>

</body>
</html>
